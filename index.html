<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Adithyaaa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #fbc2eb, #fcd5ce);
  text-align: center;
}

/* pages */
.page { display:none; padding:40px; }
.active { display:block; }

/* boxes */
.box, .letter {
  background:#ffe5d9;
  padding:20px;
  border-radius:15px;
  display:inline-block;
}

/* button */
button {
  padding:10px 20px;
  background:#ff6f91;
  color:white;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

/* options */
.option {
  margin:10px;
  padding:10px;
  background:#ffe5d9;
  border-radius:10px;
  cursor:pointer;
}
.correct { background:lightgreen; }

/* gallery grid */
.gallery {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin-top:20px;
}

/* CARD */
.card { perspective:1000px; }

.inner {
  width:100%;
  aspect-ratio: 4/5;   /* ✅ 4:5 ratio */
  position:relative;
  transform-style:preserve-3d;
  transition:0.6s;
}

.card.flip .inner { transform:rotateY(180deg); }

.front, .back {
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  overflow:hidden;
}

.front {
  background:#ffe5d9;
  font-size:14px;
  padding:10px;
}

.back {
  transform:rotateY(180deg);
}

.back img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* envelope */
.envelope {
  width:160px;
  height:110px;
  background:pink;
  margin:20px auto;
  border-radius:10px;
  position:relative;
}
.envelope::before {
  content:"❤️";
  position:absolute;
  top:35px;
  left:65px;
  font-size:28px;
}

</style>
</head>

<body>

<audio id="bgMusic" src="music.mp3" loop></audio>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h1>Happy Birthday Adithyaaa ❤️</h1>
  <div class="envelope"></div>
  <button onclick="startGame()">Click here for a short game</button>
</div>

<!-- QUIZ -->
<div class="page" id="quizPage">
  <div class="box">
    <h2 id="question"></h2>
    <div id="options"></div>
  </div>
</div>

<!-- GALLERY -->
<div class="page" id="galleryPage">
  <h2>Sweet Memories❤️</h2>
  <div class="gallery" id="gallery"></div>
</div>

<!-- LETTER -->
<div class="page" id="letterPage">
  <div class="letter">
    <h2>A Special Letter💌</h2>
    <p>
Hi chakaniii 😊💖<br><br>
You’ve come so far ✨<br>
Keep growing stronger every day 🌟<br><br>
Stay happy always ❤️<br><br>
With Love 💖
    </p>
  </div>
</div>

<script>

/* QUESTIONS */
let questions=[
{
q:"Can you guess when you started Infosys (your first MNC)?",
options:["Jan 2018","Oct 2019","Mar 2020","Dec 2021"],
correct:"Oct 2019"
},
{
q:"When did your first bike come into your life? 😉",
options:["Jan 2020","Aug 2022","Dec 2020","Apr 2021"],
correct:"Apr 2021"
},
{
q:"When did you join TCS?",
options:["Sep 2022","Jul 2021","Jan 2023","Dec 2022"],
correct:"Sep 2022"
}
];

let index=0;

/* START */
function startGame(){
  showPage("quizPage");
  loadQuestion();
}

/* TYPE EFFECT */
function typeText(text,el){
  el.innerHTML="";
  let i=0;
  let inter=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(inter);
  },25);
}

/* LOAD QUESTION */
function loadQuestion(){
  let q=questions[index];
  typeText(q.q,document.getElementById("question"));

  let opt=document.getElementById("options");
  opt.innerHTML="";

  q.options.forEach(o=>{
    let div=document.createElement("div");
    div.className="option";
    div.innerText=o;

    div.onclick=()=>{
      if(o===q.correct){
        next();
      } else {
        document.querySelectorAll(".option").forEach(x=>{
          if(x.innerText===q.correct){
            x.classList.add("correct");
          }
        });
        setTimeout(next,1200);
      }
    };

    opt.appendChild(div);
  });
}

/* NEXT */
function next(){
  index++;
  if(index<questions.length){
    loadQuestion();
  } else {
    showPage("galleryPage");
    loadGallery();
    playMusic();
  }
}

/* GALLERY DATA */
let images=[
"img1.jpg","img2.jpg","img3.jpg",
"img4.jpg","img5.jpg","img6.jpg",
"img7.jpg","img8.jpg","img9.jpg",
"img10.jpg","img11.jpg","img12.jpg"
];

let messages=[
"Cutiepie 💖","Memories 😄","Friends 😊",
"College 🔥","Fun 🌟","Journey 💫",
"Infosys ✨","Bike ❤️","Love 💖",
"TCS 🌟","Moon 🌙","Beach 🌊"
];

/* GALLERY LOGIC */
let opened=new Set();

function loadGallery(){
  let g=document.getElementById("gallery");
  g.innerHTML="";
  opened.clear();

  images.forEach((img,i)=>{
    let card=document.createElement("div");
    card.className="card";

    let inner=document.createElement("div");
    inner.className="inner";

    inner.innerHTML=`
      <div class="front">${messages[i]}</div>
      <div class="back"><img src="${img}"></div>
    `;

    card.onclick=()=>{
      card.classList.toggle("flip");
      opened.add(i);

      if(opened.size===images.length){
        setTimeout(()=>{
          showPage("letterPage");
        },1000);
      }
    };

    card.appendChild(inner);
    g.appendChild(card);
  });
}

/* PAGE SWITCH */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* MUSIC */
function playMusic(){
  let a=document.getElementById("bgMusic");
  a.play().catch(()=>{});
}

</script>

</body>
</html>
