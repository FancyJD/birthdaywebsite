<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Adithyaaa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to right, #fbc2eb, #fcd5ce);
  text-align: center;
}

.page { display:none; height:100vh; padding:40px; }
.active { display:block; }

.box, .letter {
  background:#ffe5d9;
  padding:20px;
  border-radius:15px;
  display:inline-block;
}

button {
  padding:10px 20px;
  background:#ff6f91;
  color:white;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.option {
  margin:10px;
  padding:10px;
  background:#ffe5d9;
  border-radius:10px;
  cursor:pointer;
}
.correct { background:lightgreen; }

.gallery {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.card { perspective:1000px; }
.inner {
  width:100%;
  height:120px;
  position:relative;
  transform-style:preserve-3d;
  transition:0.6s;
}
.card.flip .inner { transform:rotateY(180deg); }

.front,.back {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  backface-visibility:hidden;
  background:#ffe5d9;
}
.back { transform:rotateY(180deg); }

.envelope {
  width:160px;
  height:110px;
  background:pink;
  margin:20px auto;
  border-radius:10px;
  position:relative;
}
.envelope::before {
  content:"❤️";
  position:absolute;
  top:35px;
  left:65px;
  font-size:28px;
}
</style>
</head>

<body>

<audio id="bgMusic" src="music.mp3" loop></audio>

<!-- PAGE 1 -->
<div class="page active" id="page1">
  <h1>Happy Birthday Adithyaaa ❤️</h1>
  <div class="envelope"></div>
  <button onclick="startGame()">Click here for a short game</button>
</div>

<!-- QUIZ -->
<div class="page" id="quizPage">
  <div class="box">
    <h2 id="question"></h2>
    <div id="options"></div>
  </div>
</div>

<!-- GALLERY -->
<div class="page" id="galleryPage">
  <h2>Sweet Memories❤️</h2>
  <div class="gallery" id="gallery"></div>
</div>

<!-- LETTER -->
<div class="page" id="letterPage">
  <div class="letter">
    <h2>A Special Letter💌</h2>
    <p>
Hi chakaniii 😊💖<br><br>
You’ve come so far ✨<br>
Keep shining always 🌟<br><br>
Stay happy ❤️<br><br>
With Love 💖
    </p>
  </div>
</div>

<script>

/* QUESTIONS */
let questions=[
{
q:"Can you guess the year you started working at Infosys (your first MNC)?",
options:["January 2018","October 2019","March 2020","December 2021"],
correct:"October 2019"
},
{
q:"When did you get your first bike? 😉",
options:["January 2020","August 2022","December 2020","April 2021"],
correct:"April 2021"
},
{
q:"When did you join TCS?",
options:["September 2022","July 2021","Jan 2023","Dec 2022"],
correct:"September 2022"
}
];

let index=0;

/* START */
function startGame(){
  showPage("quizPage");
  loadQuestion();
}

/* TYPE EFFECT */
function typeText(text,el){
  el.innerHTML="";
  let i=0;
  let inter=setInterval(()=>{
    el.innerHTML+=text[i];
    i++;
    if(i>=text.length) clearInterval(inter);
  },30);
}

/* LOAD QUESTION */
function loadQuestion(){
  let q=questions[index];
  typeText(q.q,document.getElementById("question"));

  let opt=document.getElementById("options");
  opt.innerHTML="";

  q.options.forEach(o=>{
    let div=document.createElement("div");
    div.className="option";
    div.innerText=o;

    div.onclick=()=>{
      if(o===q.correct){
        next();
      } else {
        document.querySelectorAll(".option").forEach(x=>{
          if(x.innerText===q.correct){
            x.classList.add("correct");
          }
        });
        setTimeout(next,1200);
      }
    };

    opt.appendChild(div);
  });
}

/* NEXT */
function next(){
  index++;
  if(index<questions.length){
    loadQuestion();
  } else {
    showPage("galleryPage");
    loadGallery();
    playMusic();
  }
}

/* GALLERY */
let images=[
"img1.jpg","img2.jpg","img3.jpg",
"img4.jpg","img5.jpg","img6.jpg",
"img7.jpg","img8.jpg","img9.jpg",
"img10.jpg","img11.jpg","img12.jpg"
];

let messages=[
"Cutiepie 💖","Memories 😄","Friends 😊",
"College 🔥","Fun 🌟","Journey 💫",
"Infosys ✨","Bike ❤️","Love 💖",
"TCS 🌟","Moon 🌙","Beach 🌊"
];

let flippedCount=0;

function loadGallery(){
  let g=document.getElementById("gallery");
  g.innerHTML="";
  flippedCount=0;

  images.forEach((img,i)=>{
    let card=document.createElement("div");
    card.className="card";

    let inner=document.createElement("div");
    inner.className="inner";

    inner.innerHTML=`
      <div class="front">${messages[i]}</div>
      <div class="back"><img src="${img}" width="100%" height="100%"></div>
    `;

    card.onclick=()=>{
      if(!card.classList.contains("flip")){
        card.classList.add("flip");
        flippedCount++;
      }

      // 👉 go to letter after ALL images opened
      if(flippedCount===images.length){
        setTimeout(()=>{
          showPage("letterPage");
        },1000);
      }
    };

    card.appendChild(inner);
    g.appendChild(card);
  });
}

/* PAGE SWITCH */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

/* MUSIC */
function playMusic(){
  let a=document.getElementById("bgMusic");
  a.play().catch(()=>{});
}

</script>

</body>
</html>
